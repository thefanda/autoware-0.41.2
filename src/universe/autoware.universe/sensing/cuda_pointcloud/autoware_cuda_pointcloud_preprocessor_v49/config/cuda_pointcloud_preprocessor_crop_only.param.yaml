/**:
  ros__parameters:
    base_frame: base_link
    processing_time_threshold_sec: 0.01

    # Crop box parameters (can specify multiple boxes)
    # Example: crop_box.min_x: [-2.0, -1.5] for two boxes
    # crop_box.negative:
    #  - true  -> keep points outside all boxes (previous behavior)
    #  - false -> keep points inside at least one box
    crop_box.negative: true
    crop_box.min_x: [-60.0]
    crop_box.min_y: [-60.0]
    crop_box.min_z: [-60.0]
    crop_box.max_x: [60.0]
    crop_box.max_y: [60.0]
    crop_box.max_z: [60.0]

